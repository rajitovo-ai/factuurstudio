<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=3" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factuur Studio – Online facturen maken voor zzp'ers en mkb</title>
    <meta name="description" content="Maak professionele facturen in seconden. Factuur Studio is dé eenvoudige factuurapp voor Nederlandse zzp'ers en mkb. Gratis starten, geen abonnement nodig." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://factuurstudio.nl/" />
    <link rel="alternate" hreflang="nl" href="https://factuurstudio.nl/" />

    <!-- Open Graph (voor social sharing en Google rich previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://factuurstudio.nl/" />
    <meta property="og:title" content="Factuur Studio – Online facturen maken voor zzp'ers en mkb" />
    <meta property="og:description" content="Maak professionele facturen in seconden. Gratis starten, geen abonnement nodig." />
    <meta property="og:locale" content="nl_NL" />

    <!-- Structured Data (JSON-LD) voor Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Factuur Studio",
      "url": "https://factuurstudio.nl",
      "description": "Online factuurapp voor Nederlandse zzp'ers en mkb. Maak professionele facturen in seconden.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Gratis",
          "price": "0",
          "priceCurrency": "EUR"
        },
        {
          "@type": "Offer",
          "name": "Pro maandelijks",
          "price": "4.99",
          "priceCurrency": "EUR",
          "billingIncrement": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Pro jaarlijks",
          "price": "39.99",
          "priceCurrency": "EUR",
          "billingIncrement": "P1Y"
        }
      ],
      "inLanguage": "nl",
      "audience": {
        "@type": "Audience",
        "geographicArea": {
          "@type": "Country",
          "name": "Netherlands"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
